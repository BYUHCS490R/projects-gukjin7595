<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Processing</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>

    </form>

    <p id="responseMessage"></p>

    <script src="form.js"></script>


</body>
