<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip</title>
    <link rel="stylesheet" href="final.css">
</head>
<body>
    <header>
        <h1>Tips for traveler</h1>
    </header>

    <nav>
        <a href="final.html">Home</a>
        <a href="food.html">Food</a>
        <a href="activities.html">Activities</a>
        <a href="place.html">Place</a>
        <a href="Culture.html">Culture</a>
        <a href="tip.html">Tip</a>
        <a href="contact.html" class="active">Contact</a>
    </nav>

    <main>
        <form id="myform">
            <fieldset>
                <legend>Contact Information</legend>
                <div class="form-row">
                    <label for="name">full name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-row">
                    <label for="password">password:</label>
                    <input type="password" id="password" name="password">
                </div>
                <div class="form-row">
                    <label for="email">email:</label>
                    <input type="email" id="email" name="email">
                </div>
                <div class="form-row">
                    <label for="phone">phone:</label>
                    <input type="tel" id="phone" name="phone">
                </div>
            </fieldset>

            <fieldset>
                <legend>Preferences</legend>
                <div class="form-row">
                    <label>Gender:</label>
                    <div>
                        <label><input type="radio" name="Gender" value="male">Male</label>
                        <label><input type="radio" name="Gender" value="female">Female</label>
                    </div>
                </div>
                <div class="form-row">
                    <label>hobby :</label>
                    <div>
                        <label><input type="checkbox" name="hobby" value="sport">sport</label>
                        <label><input type="checkbox" name="hobby" value="travle">travle</label>
                        <label><input type="checkbox" name="hobby" value="eating">eating</label>
                        <label><input type="checkbox" name="hobby" value="Making">Making</label>
                    </div>
                </div>

                <div class="form-row">
                    <label for="comments">comment:</label>
                    <textarea id="comments" name="comments"></textarea> 
                </div>

                <div>
                    <input type="submit" value="submit">
                </div>
            </fieldset>
        </form>
    </main>
    <footer><p>&copy;2026 GukJin Song</p></footer>
    

    <script>
        document.getElementById('myform').addEventListener('submit',function(event) {
            event.preventDefault();

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const phone = document.getElementById('phone').value;

            if (!name || !email) {
                alert('need a name and email.');
                return
            }

            const formData = {
                name: name,
                email: email,
                password: password,
                phone: phone
            };

            console.log(formData);
            const xhr = new XMLHttpRequest();
            xhr.open("GET", "submit.json", true);
            xhr.setRequestHeader("Content-Type", "application/json;charset=UTF-8");
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    alert("This form successfully submitted")
                    const response = JSON.parse(xhr.responseText);
                    console.log(response);
                    document.getElementById('myform').innerHTML = '';
                    document.getElementById('message').innerText = response.message;
                } else if (xhr.readyState === 4) {
                    alert("Error submitting form")
                }
            };
            xhr.send(JSON.stringify(formData));
        });
    </script>
</body>
</html>
