<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="form.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
    <header>
        Song web Design
    </header>
    <main id="message">
        <form id='myForm' action="formprocs.html" method="get">
            <fieldset>
                <legend>Sign Up</legend>
            <div class="form-row">
                <label for="fname">Name:</label>
                <input type="text" name="fullname" id="fname" required>
            </div>
            <div class="form-row">
                <label for="email">Email:</label>
                <input type="email" name="email" id="email" placeholder="name@email.com">
            </div>
            <div class="form-row">
                <label for="password">Password:</label>
                <input type="password" name="pass" id="password">
            </div>
            <div class="form-row">
                <label for="state">State:</label>
                <select name="state" id="state">
                    <option value="CA">California</option>
                    <option value="HI">Hawaii</option>
                    <option value="UT">Utah</option>
                </select>
            </div>
            <div class="form-row">
                <label for="comments">Comments</label>
                <textarea name="comments" id="comments">Pre-filled in</textarea>
            </div>
            <div class="check-row"> 
                <div class="spacer">Gender:</div> 
                <label><input type="radio" name="Gender" value="male"> Male</label>
                <label><input type="radio" name="Gender" value="female"> Female</label>
            </div>
            <div class="form-row">
                <div class="spacer"></div>
                <label><input type="checkbox" name="remember" value="male" checked> Remember me?</label>
            </div>
            <div class="form-row">
                <input type="submit" value="Sign Up">
            </div>
            </fieldset>
        </form>

        <h2>Questions</h2>
        <p>What is AJAX?</p>
        <p>AJAX is a technique that allows a web page to update data without reloading the entire page.</p>
        <p>Why do you put your JS code in a separate file?</p>
        <p>Makes HTML cleaner and improves performance.</p>
        

    </main>
    <footer>
        <p>&copy; 2026 GukJin Song</p>
    </footer>

    <script src="form.js"></script>
</body>
</html>
